<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="orbGlow1" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbGlow2" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="900" height="320" rx="16" fill="url(#grid)"/>

  <!-- Ambient glow orbs -->
  <circle cx="150" cy="160" r="180" fill="url(#orbGlow1)"/>
  <circle cx="750" cy="160" r="200" fill="url(#orbGlow2)"/>

  <!-- Decorative circuit lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="120" y1="80" x2="140" y2="100"/>
    <circle cx="140" cy="100" r="2" fill="#06b6d4" opacity="0.6"/>

    <line x1="900" y1="240" x2="780" y2="240"/>
    <line x1="780" y1="240" x2="760" y2="220"/>
    <circle cx="760" cy="220" r="2" fill="#8b5cf6" opacity="0.6"/>

    <line x1="0" y1="260" x2="80" y2="260"/>
    <line x1="80" y1="260" x2="95" y2="245"/>
    <circle cx="95" cy="245" r="2" fill="#ec4899" opacity="0.4"/>

    <line x1="900" y1="60" x2="830" y2="60"/>
    <line x1="830" y1="60" x2="815" y2="75"/>
    <circle cx="815" cy="75" r="2" fill="#06b6d4" opacity="0.4"/>
  </g>

  <!-- Claw Icon -->
  <g transform="translate(170, 90)" filter="url(#glow)">
    <!-- Three claw marks -->
    <path d="M 0 0 Q 15 50 5 110" stroke="url(#clawGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 25 -10 Q 35 45 30 120" stroke="url(#clawGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 50 0 Q 55 50 55 110" stroke="url(#clawGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Claw tips (tapered) -->
    <circle cx="5" cy="110" r="3" fill="#ec4899" opacity="0.9"/>
    <circle cx="30" cy="120" r="3.5" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="55" cy="110" r="3" fill="#06b6d4" opacity="0.9"/>

    <!-- Micro dot cluster at top -->
    <circle cx="12" cy="-15" r="1.5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="25" cy="-20" r="2" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="38" cy="-15" r="1.5" fill="#ec4899" opacity="0.7"/>
  </g>

  <!-- MicroClaw text -->
  <text x="280" y="155" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="url(#textGrad)" letter-spacing="-2">
    Micro<tspan fill="url(#accentGrad)">Claw</tspan>
  </text>

  <!-- Tagline -->
  <text x="284" y="195" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#94a3b8" letter-spacing="4">
    AGENTIC AI RUNTIME FOR THE REAL WORLD
  </text>

  <!-- Accent line under tagline -->
  <rect x="284" y="210" width="120" height="2" rx="1" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Version pill -->
  <g transform="translate(284, 230)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="40" y="16" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#06b6d4">v1.2.25</text>
  </g>

  <!-- BYOK pill -->
  <g transform="translate(374, 230)">
    <rect width="55" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="27.5" y="16" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#8b5cf6">BYOK</text>
  </g>

  <!-- MIT pill -->
  <g transform="translate(439, 230)">
    <rect width="45" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="22.5" y="16" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ec4899">MIT</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="316" width="900" height="4" rx="0" fill="url(#accentGrad)" opacity="0.4"/>
</svg>
